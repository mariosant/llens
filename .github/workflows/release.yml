name: Release

on:
  push:
    branches:
      - main

jobs:
  build-binary:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-latest
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build ${{ matrix.platform }} binary
        run: bun run build:${{ matrix.platform }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: llens-${{ matrix.platform }}
          path: |
            dist/llens-${{ matrix.platform }}{{ matrix.platform == 'windows-x64' && '.exe' || '' }}

  release:
    needs: build-binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        run: |
          cd dist
          for dir in */; do
            base="${dir%/}"
            if [[ "$base" == llens-* ]]; then
              platform="${base#llens-}"
              if [[ "$platform" == "windows-x64" ]]; then
                mv "${dir}"* "llens-windows-x64.exe" 2>/dev/null || true
              else
                mv "${dir}"* "llens-${platform}"
              fi
            fi
          done
          rm -rf */ || true
          ls -la

      - name: Setup Node.js for semantic-release
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run semantic-release
